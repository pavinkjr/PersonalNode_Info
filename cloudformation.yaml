AWSTemplateFormatVersion: '2010-09-09'
Description: S3 + CloudFront static website hosting for PersonalNode Protocol site

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket for the static site
    AllowedPattern: '^[a-z0-9][a-z0-9.-]*[a-z0-9]$'
    ConstraintDescription: Must be a valid S3 bucket name
  DomainName:
    Type: String
    Description: Custom domain name (e.g. personalnode.com)
    Default: personalnodeprotocol.com
  CertificateArn:
    Type: String
    Description: ACM certificate ARN (must be in us-east-1)
    Default: arn:aws:acm:us-east-1:937932185277:certificate/c622fed4-16a7-4c66-a307-05b48568dc3b
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Existing Route 53 hosted zone ID for the domain
    Default: Z06584221PHE1YMVQWVWM

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${WebsiteBucket}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}'

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${BucketName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Aliases:
          - !Ref DomainName
          - !Sub 'www.${DomainName}'
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  DNSRecord:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      HostedZoneId: !Ref HostedZoneId
      RecordSets:
        - Name: !Ref DomainName
          Type: A
          AliasTarget:
            HostedZoneId: Z2FDTNDATAQYW2  # CloudFront's fixed hosted zone ID
            DNSName: !GetAtt Distribution.DomainName
        - Name: !Sub 'www.${DomainName}'
          Type: A
          AliasTarget:
            HostedZoneId: Z2FDTNDATAQYW2
            DNSName: !GetAtt Distribution.DomainName

Outputs:
  WebsiteURL:
    Description: HTTPS URL of the website
    Value: !Sub 'https://${DomainName}'

  CloudFrontURL:
    Description: CloudFront distribution URL
    Value: !Sub 'https://${Distribution.DomainName}'

  DistributionId:
    Description: CloudFront distribution ID (use for cache invalidation)
    Value: !Ref Distribution

  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref WebsiteBucket
